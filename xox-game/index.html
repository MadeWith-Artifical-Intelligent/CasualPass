<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium XOX Game</title>
    <link rel="stylesheet" href="../shared-settings.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="../shared-settings.js"></script>
</head>

<body class="theme-liquid">
    <!-- Dynamic Background via Shared Settings -->
    <div id="global-bg-container" class="background-container"></div>

    <a href="../index.html" class="back-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Back to Games</span>
    </a>

    <main class="game-container">
        <header>
            <h1 class="glow-text">Tic Tac Toe</h1>
        </header>

        <!-- Pre-Game Lobby / Config Menu -->
        <div id="config-menu" class="config-menu">
            <h2>Lobby</h2>

            <div class="auth-section" id="auth-section">
                <input type="text" id="player-name-input" placeholder="Kullanıcı Adı" class="custom-input">
                <div class="preset-buttons">
                    <button class="preset-btn active" id="btn-guest">Misafir Girişi</button>
                    <button class="preset-btn" id="btn-login" style="border-color: var(--cp-accent);">Giriş Yap</button>
                </div>
            </div>

            <div class="player-info hidden" id="player-info">
                Hoş geldin, <span id="display-player-name" style="color: var(--cp-accent); font-weight: bold;"></span>!
                <button id="btn-logout" class="icon-btn"
                    style="width:30px;height:30px;font-size:12px;margin-left:10px;">X</button>
            </div>

            <div class="custom-settings">
                <div class="setting-row">
                    <label>Oyun Modu</label>
                    <div class="preset-buttons" style="grid-template-columns: 1fr 1fr;">
                        <button class="preset-btn active" id="mode-bot">Bot'a Karşı</button>
                        <button class="preset-btn" id="mode-local">2 Oyuncu (Lokal)</button>
                    </div>
                </div>

                <!-- Opponent Name (For Local 2P) -->
                <div class="setting-row hidden" id="local-player2-row">
                    <label>2. Oyuncu İsmi</label>
                    <input type="text" id="player2-name-input" placeholder="Arkadaşının Adı" class="custom-input"
                        value="Oyuncu 2">
                </div>

                <!-- Bot Difficulty (For Bot Mode) -->
                <div class="setting-row" id="bot-difficulty-row">
                    <label>Bot Zorluğu</label>
                    <div class="preset-buttons" style="grid-template-columns: 1fr 1fr 1fr;">
                        <button class="preset-btn active" data-difficulty="easy">Kolay</button>
                        <button class="preset-btn" data-difficulty="medium">Orta</button>
                        <button class="preset-btn" data-difficulty="impossible">İmkansız</button>
                    </div>
                </div>
            </div>

            <button class="btn start-btn" id="start-game-btn" style="width: 100%;">
                <span class="btn-text">Oyuna Başla</span>
            </button>

            <!-- Leaderboard Trigger -->
            <button class="btn text-btn" id="show-leaderboard-btn"
                style="background: transparent; border: none; font-size: 0.9rem; margin-top: 10px;">
                🏆 Liderlik Tablosu
            </button>
        </div>

        <div id="game-area" class="hidden"
            style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="scores" id="scores" style="margin-bottom: 1.5rem;">
                <div class="score-card x-score active">
                    <span class="player-label" id="label-x">Player X</span>
                    <span class="score-value" id="score-x">0</span>
                </div>
                <div class="score-card o-score">
                    <span class="player-label" id="label-o">Player O</span>
                    <span class="score-value" id="score-o">0</span>
                </div>
            </div>

            <div class="status-display" id="status">Player X's Turn</div>

            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <button class="btn reset-btn" id="reset-btn" style="margin-top: 1rem;">
                <span class="btn-text">Tekrar Oyna</span>
            </button>
            <button class="btn text-btn" id="back-to-lobby-btn"
                style="background: transparent; border: none; font-size: 0.9rem; margin-top: 10px;">
                Lobiye Dön
            </button>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboard-modal" class="overlay hidden">
            <div class="config-menu" style="max-width: 400px;">
                <h2>🏆 Liderlik Tablosu 🏆</h2>
                <div id="leaderboard-content"
                    style="max-height: 250px; overflow-y: auto; margin: 1rem 0; text-align: left;">
                    <!-- Rows populated via JS -->
                </div>
                <button class="btn" id="close-leaderboard-btn">Kapat</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

    <!-- Audio assets to be used globally -->
    <audio id="global-click-sound" src="https://cdn.freesound.org/previews/415/415096_7413867-lq.mp3"
        preload="auto"></audio>
    <audio id="global-pop-sound" src="https://cdn.freesound.org/previews/242/242501_4414128-lq.mp3"
        preload="auto"></audio>
</body>

</html>
