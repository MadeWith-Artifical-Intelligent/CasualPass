<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - CasualPass</title>
    <link rel="stylesheet" href="../shared-settings.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="../shared-settings.js"></script>
</head>

<body class="theme-liquid">
    <!-- Dynamic Background via Shared Settings -->
    <div id="global-bg-container" class="background-container"></div>

    <a href="../index.html" class="back-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Back to Games</span>
    </a>

    <main class="game-container">
        <header>
            <h1 class="glow-text">2048</h1>
            <div class="scores">
                <div class="score-card">
                    <span class="player-label">Score</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-card personal-best">
                    <span class="player-label">Best</span>
                    <span class="score-value" id="best-score">0</span>
                </div>
            </div>
        </header>

        <div class="board-wrapper" id="board-wrapper">
            <div class="grid" id="grid">
                <!-- 4x4 cells generated by JS -->
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over-overlay" class="overlay hidden">
                <h2 class="game-over-text" id="game-over-text">Oyun Bitti!</h2>
                <p class="final-score-text">Skor: <span id="final-score">0</span></p>
                <button class="btn" id="restart-btn">Tekrar Oyna</button>
                <button class="btn text-btn" id="back-to-menu-btn"
                    style="margin-top: 10px; background: transparent; border: none; font-size: 0.9rem;">
                    Menuye Don
                </button>
            </div>
        </div>

        <div class="game-controls">
            <button class="btn" id="new-game-btn">Yeni Oyun</button>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <button class="d-pad up" data-dir="up">&#9650;</button>
            <div class="d-pad-middle">
                <button class="d-pad left" data-dir="left">&#9664;</button>
                <div class="d-pad-center"></div>
                <button class="d-pad right" data-dir="right">&#9654;</button>
            </div>
            <button class="d-pad down" data-dir="down">&#9660;</button>
        </div>
    </main>

    <script src="script.js"></script>

    <!-- Audio -->
    <audio id="global-click-sound" src="https://cdn.freesound.org/previews/415/415096_7413867-lq.mp3"
        preload="auto"></audio>
    <audio id="global-pop-sound" src="https://cdn.freesound.org/previews/242/242501_4414128-lq.mp3"
        preload="auto"></audio>
</body>

</html>
